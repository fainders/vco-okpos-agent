<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VCO OKPOS Agent</title>
    <link rel="stylesheet" href="overlay.css" />
  </head>
  <body>
    <div id="overlay-container" class="draggable">
      <div class="icon-container">
        <img id="agent-icon" src="" alt="Agent Icon" style="opacity: 0; transition: opacity 0.3s;" />
        <div id="status-indicator" class="status-indicator connected"></div>
      </div>
      <div class="status-text">
        <div id="status-label" class="status-label">실행중</div>
      </div>
    </div>
    <script>
const { ipcRenderer } = require("electron");

const overlayContainer = document.getElementById("overlay-container");
const agentIcon = document.getElementById("agent-icon");
const statusIndicator = document.getElementById("status-indicator");
const statusLabel = document.getElementById("status-label");

// 상태 업데이트 수신
ipcRenderer.on("update-status", (_event, data) => {
  const { connected, message, iconPath } = data;

  if (connected) {
    statusIndicator.classList.remove("disconnected");
    statusIndicator.classList.add("connected");
    overlayContainer.classList.remove("disconnected");
    statusLabel.textContent = message || "실행중";
  } else {
    statusIndicator.classList.remove("connected");
    statusIndicator.classList.add("disconnected");
    overlayContainer.classList.add("disconnected");
    statusLabel.textContent = message || "연결 끊김";
  }

  // 아이콘 경로 업데이트 (에러 핸들링 포함)
  if (iconPath) {
    agentIcon.src = iconPath;
    agentIcon.onload = () => {
      agentIcon.style.opacity = "1"; // 페이드 인
    };
    agentIcon.onerror = () => {
      console.error("Failed to load icon:", iconPath);
    };
  }
});

// 더블클릭 시 상세 정보 표시
statusLabel.addEventListener("dblclick", () => {
  ipcRenderer.send("show-detail-window");
});

// 초기 상태 요청
ipcRenderer.send("request-initial-status");

    </script>
  </body>
</html>
